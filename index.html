<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar SST - Daniel Martins</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #09090b; color: #f4f4f5; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(24, 24, 27, 0.8); border: 1px solid rgba(63, 63, 70, 0.4); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-4xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-emerald-400 tracking-tight uppercase italic">Radar de Prospecção Técnica</h1>
            <p class="text-zinc-400 mt-2">Engenheiro Daniel Martins - Consulta CEIS/CGU</p>
        </header>

        <div class="glass-card rounded-3xl p-8 mb-8 shadow-2xl">
            <div class="flex flex-col md:flex-row gap-4">
                <input type="text" id="cnpjInput" placeholder="Digite o CNPJ (somente números)" 
                    class="flex-1 bg-black border border-zinc-700 rounded-2xl px-6 py-4 text-lg outline-none focus:border-emerald-500 transition-all text-white">
                <button onclick="buscarNaBase()" 
                    class="bg-emerald-500 hover:bg-emerald-400 text-black font-black px-10 py-4 rounded-2xl transition-all shadow-lg shadow-emerald-500/20 uppercase">
                    Consultar Agora
                </button>
            </div>
        </div>

        <div id="resultado" class="grid gap-4 text-center">
            <div class="text-zinc-600 border-2 border-dashed border-zinc-800 rounded-3xl p-10 uppercase font-bold tracking-widest text-sm">
                Pronto para monitorar conformidade SST...
            </div>
        </div>
    </div>

    <script>
        async function buscarNaBase() {
            const cnpj = document.getElementById('cnpjInput').value.replace(/\D/g, '');
            const divResultado = document.getElementById('resultado');

            if (cnpj.length !== 14) {
                alert("Por favor, digite um CNPJ válido.");
                return;
            }

            divResultado.innerHTML = "<div class='text-emerald-500 animate-pulse font-bold uppercase'>Acessando Portal da Transparência via AllOrigins...</div>";

            const minhaChave = "0131b585c4b527e5ca52551d8ff7dbe3".trim();
            const targetUrl = `https://api.portaldatransparencia.gov.br/api-de-dados/ceis?cnpj=${cnpj}&pagina=1`;
            
            // Nova ponte profissional que não exige ativação manual
            const finalUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;

            try {
                const response = await fetch(finalUrl);
                const data = await response.json();
                
                // O AllOrigins traz o resultado dentro de um campo chamado 'contents'
                const respostaGoverno = await fetch(targetUrl, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                        'chave-api-dados': minhaChave
                    }
                });

                if (respostaGoverno.ok) {
                    const dados = await respostaGoverno.json();
                    if(dados.length > 0) {
                        divResultado.innerHTML = "";
                        dados.forEach(item => {
                            divResultado.innerHTML += `
                                <div class="bg-zinc-900 border-l-8 border-emerald-500 p-8 rounded-3xl shadow-2xl relative mb-4 text-left">
                                    <h2 class="font-black text-2xl text-white uppercase">${item.pessoa.nomeRazaoSocial}</h2>
                                    <p class="text-emerald-400 font-bold mt-2">SANÇÃO: ${item.tipoSanção.descricaoResumida}</p>
                                    <p class="text-zinc-500 text-sm mt-4 italic">${item.orgaoSancionador.nome}</p>
                                </div>`;
                        });
                    } else {
                        divResultado.innerHTML = "<div class='bg-zinc-900 p-10 rounded-3xl text-zinc-500 font-bold uppercase'>Nenhuma sanção ativa encontrada.</div>";
                    }
                } else {
                   divResultado.innerHTML = "<div class='text-red-500 font-bold'>ERRO NA CHAVE DE API (" + respostaGoverno.status + ")</div>";
                }
            } catch (erro) {
                // Se der erro de CORS, tentamos o método de segurança 2
                divResultado.innerHTML = "<div class='text-yellow-500 font-bold'>A REQUISIÇÃO FOI BLOQUEADA PELO NAVEGADOR. <br><br> TENTE ABRIR O SITE PELO CELULAR (4G) PARA TESTAR.</div>";
            }
        }
    </script>
</body>
</html>
