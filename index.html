<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Radar SST - Daniel Martins</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #050505;
            color: #f4f4f5;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        .glass {
            background: rgba(24, 24, 27, 0.85);
            border: 1px solid rgba(63, 63, 70, 0.4);
            backdrop-filter: blur(12px);
        }

        .fade {
            animation: fade .4s ease;
        }

        @keyframes fade {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0px);
            }
        }

        .spinner {
            border-top-color: transparent;
            animation: spin .8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .glow:hover {
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.35);
        }

        @media print {

            body {
                background: white;
                color: black;
            }

            .no-print {
                display: none !important;
            }

            .glass {
                background: white;
                border: 1px solid #ddd;
            }
        }
    </style>
</head>

<body class="p-4 md:p-10">

    <div class="max-w-5xl mx-auto">

        <!-- HEADER -->
        <header class="mb-12 text-center">

            <h1 class="text-4xl md:text-6xl font-black text-emerald-500 tracking-tighter uppercase italic">
                Radar de Prospecção Técnica
            </h1>

            <p class="text-zinc-500 mt-3 font-bold uppercase tracking-[4px] text-xs">
                Engenheiro Daniel Martins | Consulta CEIS-CGU
            </p>

        </header>

        <!-- CONSULTA -->
        <section class="glass rounded-3xl p-6 md:p-8 shadow-2xl mb-8 no-print">

            <div class="flex flex-col md:flex-row gap-4">

                <input type="text"
                    id="cnpjInput"
                    maxlength="18"
                    placeholder="Digite o CNPJ"
                    class="flex-1 bg-black border border-zinc-700 rounded-2xl px-6 py-4 text-lg outline-none focus:border-emerald-500 transition-all text-white font-mono" />

                <button onclick="buscarNaBase()"
                    class="bg-emerald-500 hover:bg-emerald-400 text-black font-black px-10 py-4 rounded-2xl transition-all glow uppercase tracking-tight">

                    Consultar Agora

                </button>

            </div>

        </section>

        <!-- RESULTADO -->
        <section id="resultado" class="grid gap-6">

            <div class="glass rounded-3xl p-16 text-center border border-dashed border-zinc-700">

                <div class="text-zinc-700 uppercase font-black tracking-widest text-sm">
                    Aguardando consulta...
                </div>

            </div>

        </section>

    </div>

    <script>

        // =========================================
        // FORMATADOR CNPJ
        // =========================================

        const input = document.getElementById('cnpjInput');

        input.addEventListener('input', (e) => {

            let value = e.target.value.replace(/\D/g, '');

            value = value
                .replace(/^(\d{2})(\d)/, '$1.$2')
                .replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3')
                .replace(/\.(\d{3})(\d)/, '.$1/$2')
                .replace(/(\d{4})(\d)/, '$1-$2');

            e.target.value = value;

        });

        // =========================================
        // CONSULTA
        // =========================================

        async function buscarNaBase() {

            const divResultado = document.getElementById('resultado');

            const cnpjRaw = document.getElementById('cnpjInput').value;

            const cnpj = cnpjRaw.replace(/\D/g, '');

            // =========================================
            // VALIDAR
            // =========================================

            if (cnpj.length !== 14) {

                alert('Digite um CNPJ válido.');

                return;

            }

            // =========================================
            // LOADING
            // =========================================

            divResultado.innerHTML = `

                <div class="glass rounded-3xl p-12 flex flex-col items-center justify-center fade">

                    <div class="w-10 h-10 border-4 border-emerald-500 spinner rounded-full mb-5"></div>

                    <div class="text-emerald-500 font-black uppercase tracking-widest text-sm">
                        Consultando base CEIS...
                    </div>

                </div>

            `;

            try {

                // =========================================
                // CHAMA SUA API VERCEL
                // =========================================

                const response = await fetch(`/api/ceis?cnpj=${cnpj}`);

                // =========================================
                // ERRO
                // =========================================

                if (!response.ok) {

                    throw new Error("Erro na consulta");

                }

                const lista = await response.json();

                // =========================================
                // SEM RESULTADOS
                // =========================================

                if (!Array.isArray(lista) || lista.length === 0) {

                    divResultado.innerHTML = `

                        <div class="glass rounded-3xl p-16 text-center fade border-l-8 border-zinc-700">

                            <div class="text-zinc-500 font-black uppercase tracking-widest text-sm mb-4">

                                Consulta concluída

                            </div>

                            <div class="text-zinc-300 uppercase text-xs font-bold">

                                Nenhuma sanção encontrada para este CNPJ.

                            </div>

                        </div>

                    `;

                    return;

                }

                // =========================================
                // RESULTADOS
                // =========================================

                divResultado.innerHTML = "";

                lista.forEach(item => {

                    const nome =
                        item?.pessoa?.nomeRazaoSocial || "Não informado";

                    const cnpjFormatado =
                        item?.pessoa?.cnpjFormatado || cnpjRaw;

                    const tipoSancao =
                        item?.tipoSancao?.descricaoResumida ||
                        item?.tipoSanção?.descricaoResumida ||
                        "Não informado";

                    const orgao =
                        item?.orgaoSancionador?.nome || "Não informado";

                    const dataInicio =
                        item?.dataInicioSancao || "Não informado";

                    const dataFim =
                        item?.dataFimSancao || "Não informado";

                    divResultado.innerHTML += `

                        <div class="glass rounded-3xl p-8 shadow-2xl relative fade border-l-8 border-emerald-500">

                            <div class="absolute top-0 right-0 bg-emerald-500 text-black px-5 py-2 text-[10px] font-black uppercase rounded-bl-2xl">
                                Sanção Ativa
                            </div>

                            <div class="mb-6">

                                <h2 class="font-black text-3xl text-white uppercase leading-tight mb-2">

                                    ${nome}

                                </h2>

                                <p class="text-xs text-zinc-500 font-mono uppercase tracking-widest">

                                    CNPJ: ${cnpjFormatado}

                                </p>

                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">

                                <div class="bg-black/40 p-5 rounded-2xl border border-zinc-800">

                                    <span class="text-zinc-600 block mb-2 uppercase text-[10px] font-black tracking-widest">
                                        Tipo de Sanção
                                    </span>

                                    <span class="text-emerald-400 font-bold uppercase">

                                        ${tipoSancao}

                                    </span>

                                </div>

                                <div class="bg-black/40 p-5 rounded-2xl border border-zinc-800">

                                    <span class="text-zinc-600 block mb-2 uppercase text-[10px] font-black tracking-widest">
                                        Órgão Sancionador
                                    </span>

                                    <span class="text-white font-bold uppercase italic">

                                        ${orgao}

                                    </span>

                                </div>

                                <div class="bg-black/40 p-5 rounded-2xl border border-zinc-800">

                                    <span class="text-zinc-600 block mb-2 uppercase text-[10px] font-black tracking-widest">
                                        Data Inicial
                                    </span>

                                    <span class="text-white font-bold uppercase">

                                        ${dataInicio}

                                    </span>

                                </div>

                                <div class="bg-black/40 p-5 rounded-2xl border border-zinc-800">

                                    <span class="text-zinc-600 block mb-2 uppercase text-[10px] font-black tracking-widest">
                                        Data Final
                                    </span>

                                    <span class="text-white font-bold uppercase">

                                        ${dataFim}

                                    </span>

                                </div>

                            </div>

                            <button onclick="window.print()"
                                class="w-full bg-zinc-100 hover:bg-white text-black font-black py-4 rounded-2xl transition-all uppercase text-xs tracking-widest shadow-xl no-print">

                                Gerar Relatório de Visita Técnica

                            </button>

                        </div>

                    `;

                });

            } catch (erro) {

                console.error(erro);

                divResultado.innerHTML = `

                    <div class="glass rounded-3xl p-14 text-center fade border-l-8 border-red-500">

                        <div class="text-red-500 font-black uppercase tracking-widest text-sm mb-4">

                            Erro de conexão

                        </div>

                        <div class="text-zinc-400 uppercase text-xs leading-relaxed tracking-wider">

                            O backend não respondeu.
                            <br><br>

                            Verifique:
                            <br>
                            • Deploy Vercel
                            <br>
                            • Arquivo /api/ceis.js
                            <br>
                            • Chave API da CGU
                            <br>
                            • URL da Vercel

                        </div>

                    </div>

                `;
            }
        }

    </script>

</body>

</html>
